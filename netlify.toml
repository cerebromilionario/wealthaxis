[build]
  publish = "."

# ── Form email notifications ──────────────────────────────
# After deploying, go to: Netlify Dashboard → Site → Forms → each form → Settings
# and enable "Email notification" to willianzacarias77@gmail.com
# The forms work immediately after deploy; email alerts are configured in the UI.

[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 200

[[redirects]]
  from = "/tools"
  to = "/tools/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

